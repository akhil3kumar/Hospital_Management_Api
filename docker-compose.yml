version: "3"
services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Akhil@123
      MYSQL_DATABASE: patientdb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: mysql-adminer
    restart: always
    ports:
      - "9090:8080"

  service-registry:
    build:
      context: ./service-registry
    container_name: service-registry
    restart: always
    ports:
      - "8761:8761"

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "7070:7070"
    depends_on:
      - service-registry

  patient-service:
    build:
      context: ./patient-service
    container_name: patient-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - mysql
      - service-registry

  hospital-ui:
    build:
      context: ../Hospital_Management_UI
    container_name: hospital-ui
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - patient-service

volumes:
 mysql_data:
