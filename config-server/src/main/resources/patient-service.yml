spring:
  application:
    name: patient-service
  datasource:
    url: jdbc:mysql://mysql:3307/patientdb
    username: user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update   # or validate/create-drop depending on your needs
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8081

eureka:
  instance:
    prefer-ip-address: false
  client:
    register-with-eureka: true # Prevents the server from registering as a client to itself
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
