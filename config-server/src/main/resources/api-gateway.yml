spring:
  application:
    name: api-gateway
server:
  port: 7070
eureka:
  instance:
    prefer-ip-address: false
  client:
    register-with-eureka: true # Prevents the server from registering as a client to itself
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.config: DEBUG
    org.springframework.boot.context.config: DEBUG
