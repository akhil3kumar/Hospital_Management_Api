spring:
  application:
    name: auth-service
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false


  datasource:
    url: jdbc:mysql://localhost:3307/patientdb
    username: user
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # or validate/create-drop depending on your needs
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

server:
  port: 8079


eureka:
  instance:
    prefer-ip-address: false
  client:
    register-with-eureka: true # Prevents the server from registering as a client to itself
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka


jwt:
  secret: mySuperSecretKey123456789012345678901234567890   # at least 32 chars for HS256
  expiration: 3600000